<!DOCTYPE html>
<html lang="en" date-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Github Tracker | Login</title>
    <link rel="shortcut icon" href="./assets/github-logo.png" type="image/x-icon">

    <!-- Tailwind += daisy -->
     <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- Google Fonts -->
     <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

    <style>
        *{
          font-family: "Geist", sans-serif;
        }
    </style>
</head>
<body class="min-h-screen max-w-md  mx-auto p-10">
        <section class="">
                <div class=" mt-4 flex flex-col justify-center items-center p-1 space-y-3 bg-base-100 shadow rounded-2xl">
                <img class="" src="./assets/github-logo.png" alt="">
                <h2 class="text-2xl font-bold">GitHub Issues Tracker</h2>
                <p class="text-gray-400"> Sign in to manage your issues</p>
                </div>
        
             <div class="form pt-10">
              <div class="card bg-base-100 w-full max-w-sm shrink-0 mx-auto rounded-2xl shadow">
                <div class="card-body">
                <fieldset class="fieldset">
                <label class="label text-neutral font-bold">Username</label>
                <input id="input-username" maxlength="" minlength="" type="text" class="input rounded bg-base-200" placeholder="Enter Username" />

                <br>

                <label class="label text-neutral font-bold">Password</label>
                <input id="input-password" maxlength="" type="password" class="input rounded bg-base-200" placeholder="Enter Password" />

                <button id="signIn-btn" class="btn btn-primary mt-4 rounded">Sign In</button>

                </fieldset>
              </div>
              </div>
            </div>
            <!-- OR-div -->
                    <div class="flex items-center my-6">
                        <div class="flex-grow lex-grow border-t border-gray-300 "></div>
                        <span class="text-gray-500 font-medium">OR</span>
                        <div class="flex-grow border-t border-gray-300 "></div>
                    </div>
        </section>

        <script src="./Script/signIn.js"></script>
</body>
</html>
