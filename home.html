<!DOCTYPE html>
<html lang="en" date-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Github Tracker | Login</title>
    <link rel="shortcut icon" href="./assets/github-logo.png" type="image/x-icon">

    <!-- Tailwind += daisy -->
     <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- Google Fonts -->
     <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

<!-- Font Awesome cdn -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />


    <style>
        *{
          font-family: "Geist", sans-serif;
        }
    </style>
</head>
<body class="">
      <header>
            <div class="navbar bg-base-100 shadow-sm">
                <div class="flex-1">
                    <div class="flex items-center">
                    <img class="w-[50px] h-[50px]" src="./assets/github-logo.png" alt="">
                    <a class="btn btn-ghost text-xl">GitHub Issues Tracker</a>
                    </div>
                </div>
                <div class="flex gap-2">
                    <input type="text" placeholder="Search issues..." class="input input-bordered w-24 md:w-auto" />
                    <div class="dropdown dropdown-end">
                    <div>
                        <button class="btn btn-primary"><i class="fa-solid fa-plus"></i> New Issue</button>
                    </div>
                </div> 
            </div>
      </header> 
      
      <main>
        <!-- Button-section -->
         <section class="bg-white w-11/13 mx-auto mt-10 p-4 rounded-1xl shadow">
                <button onclick="allCardLoading('all')" id="allBtn" class="btn btn-primary">All</button>
                <button onclick="allCardLoading('open')" id="openBtn" class="btn ">Open</button>
                <button onclick="allCardLoading('closed')" id="closedBtn" class="btn ">Closed</button>
         </section>

         <section class="bg-white w-11/13 mx-auto mt-3 p-4 rounded-1xl shadow">
                <div class="flex justify-between items-center">
                    <div class="flex gap-2">
                        <img class="" src="./assets/Aperture.png" alt="">
                        <div class="">
                            <h2 class="text-1xl font-bold"><span class="">50</span> Issues</h2>
                            <p class="text-gray-400">Track and manage your project issues</p>
                        </div>
                    </div>
                    <div class="flex gap-2 ">
                        <p><i class="text-green-500 fa-solid fa-circle"></i>Open</p>
                    <p><i class="text-red-500 fa-solid fa-circle"></i> Closed</p>
                    </div>
                </div>
        
         </section>

         <!-- Loading-Section -->
         <section id="loading-spinner" class="w-11/13 mx-auto hidden flex justify-center items-center mt-6">
            <span class="loading loading-spinner loading-xl"></span>
        </section>


         <!-- Card-Container -->

         <section id="card-container" class="w-11/13 mx-auto bg-sky-50 grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-3 mt-2 p-3">
                
        </section>

        
      </main>

      <script src="/Script/home.js"></script>
</body>
</html>
